name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Semantic Release (npm)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Sync version to jsr.json
        run: node -e "
          const pkg = require('./package.json');
          const jsr = require('./jsr.json');
          jsr.version = pkg.version;
          require('fs').writeFileSync('jsr.json', JSON.stringify(jsr, null, 2) + '\n');
          console.log('jsr.json version synced to', pkg.version);
        "

      - name: Publish to JSR
        run: npx jsr publish
