name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test CLI
        run: |
          node dist/cli.js generate \
            --routes-dir examples/zod-heavy/src/routes \
            --schema-files "examples/zod-heavy/src/lib/schemas/*.ts" \
            --output /tmp/test-spec.json \
            --title "CI Test"
          node -e "const d=require('/tmp/test-spec.json'); console.log('OK:', d.openapi, Object.keys(d.paths).length, 'paths')"
